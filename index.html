<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="A clean, minimal school calendar, task manager, and focus timer to stay in the zone.">
  <title>Tenor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Monoton&family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="app-shell">
    <div class="ambient-background">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>

    <!-- ═══════════ SWIPEABLE VIEW CONTAINER ═══════════ -->
    <div class="view-container" id="view-container">

      <!-- ── VIEW 1: CALENDAR ── -->
      <div class="view" id="view-calendar" data-view="calendar">
        <div class="app-container">
          <header class="top-nav">
            <h1 class="logo">Tenor</h1>
            <button id="add-task-btn" class="btn-primary">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="vertical-align: middle; margin-right: 4px;">
                <line x1="8" y1="3" x2="8" y2="13"></line>
                <line x1="3" y1="8" x2="13" y2="8"></line>
              </svg>
              Add Task
            </button>
          </header>

          <main class="content-split">
            <section class="calendar-view card">
              <div class="calendar-header">
                <h2 id="current-month">Month Year</h2>
                <div class="month-controls">
                  <button id="prev-month" aria-label="Previous month">
                    <svg viewBox="0 0 16 16"><polyline points="10 4 6 8 10 12"></polyline></svg>
                  </button>
                  <button id="next-month" aria-label="Next month">
                    <svg viewBox="0 0 16 16"><polyline points="6 4 10 8 6 12"></polyline></svg>
                  </button>
                </div>
              </div>
              <div class="calendar-grid" id="calendar-grid">
                <div class="day-header">Sun</div>
                <div class="day-header">Mon</div>
                <div class="day-header">Tue</div>
                <div class="day-header">Wed</div>
                <div class="day-header">Thu</div>
                <div class="day-header">Fri</div>
                <div class="day-header">Sat</div>
              </div>
            </section>

            <section class="duelist-view card">
              <h2>Upcoming</h2>
              <div id="duelist-list" class="task-list">
                <!-- Tasks injected by JS -->
              </div>
            </section>
          </main>
        </div>
      </div>

      <!-- ── VIEW 2: ZONE (Focus Timer) ── -->
      <div class="view" id="view-zone" data-view="zone">
        <div class="zone-container zone-mode-setup" id="zone-container">
          
          <!-- Animated Background for Active State -->
          <div class="meteor-shower">
            <div class="meteor m-1"></div>
            <div class="meteor m-2"></div>
            <div class="meteor m-3"></div>
            <div class="meteor m-4"></div>
            <div class="meteor m-5"></div>
            <div class="meteor m-6"></div>
          </div>

          <!-- ZONE: Setup Screen -->
          <div class="zone-setup" id="zone-setup">
            <div class="zone-setup-inner">
              <div class="zone-header">
                <h1 class="zone-title">Zone</h1>
                <p class="zone-subtitle">Pick your duration. Lock in.</p>
              </div>

              <!-- Circular Dial Selector -->
              <div class="zone-dial" id="zone-dial">
                <svg class="zone-dial-svg" viewBox="0 0 280 280">
                  <circle class="zone-dial-track" cx="140" cy="140" r="130" />
                  <circle class="zone-dial-progress" id="setup-dial-progress" cx="140" cy="140" r="130" />
                </svg>
                <div class="zone-dial-rotator" id="zone-dial-rotator">
                  <div class="zone-dial-handle"></div>
                </div>
                <div class="zone-dial-center">
                  <span class="zone-dial-value" id="zone-dial-value">45</span>
                  <span class="zone-dial-unit">min</span>
                </div>
              </div>

              <button class="btn-primary block-btn" id="zone-start-btn">Start</button>
            </div>
          </div>

          <!-- ZONE: Active Timer Screen -->
          <div class="zone-active" id="zone-active">
            <div class="zone-active-inner">
              <div class="zone-ring" id="zone-ring">
                <svg class="zone-ring-svg" viewBox="0 0 200 200">
                  <circle class="zone-ring-bg" cx="100" cy="100" r="90" />
                  <circle class="zone-ring-progress" id="zone-ring-progress" cx="100" cy="100" r="90" />
                </svg>
                <div class="zone-time-display">
                  <span class="zone-time" id="zone-time">00:00</span>
                  <span class="zone-label" id="zone-label">remaining</span>
                </div>
              </div>

              <div class="zone-controls">
                <button class="zone-ctrl-btn" id="zone-pause-btn" aria-label="Pause/Resume">
                  <svg class="icon-pause" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <rect x="6" y="4" width="4" height="16" rx="1"></rect>
                    <rect x="14" y="4" width="4" height="16" rx="1"></rect>
                  </svg>
                  <svg class="icon-play hidden" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <polygon points="6,4 20,12 6,20"></polygon>
                  </svg>
                </button>
                <button class="zone-ctrl-btn zone-ctrl-stop" id="zone-stop-btn" aria-label="Stop timer">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <rect x="6" y="6" width="12" height="12" rx="2"></rect>
                  </svg>
                </button>
              </div>
            </div>
          </div>

        </div>
      </div>

    </div>

    <!-- ═══════════ BOTTOM TAB BAR ═══════════ -->
    <!-- ═══════════ BOTTOM TAB BAR (FLOATING PILL) ═══════════ -->
    <div class="tab-bar-container">
      <nav class="tab-bar" id="tab-bar">
        <button class="tab-item active" data-view="calendar" id="tab-calendar">
          <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"></rect>
            <line x1="3" y1="10" x2="21" y2="10"></line>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
          </svg>
          <span class="tab-label">Calendar</span>
        </button>
        <button class="tab-item" data-view="zone" id="tab-zone">
          <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
          <span class="tab-label">Zone</span>
        </button>
      </nav>
    </div>

  </div>

  <!-- Add/Edit Modal -->
  <div id="task-modal" class="modal hidden">
    <div class="modal-content">
      <span class="close-btn">&times;</span>
      <h2 id="modal-title">Add Task</h2>
      <form id="task-form">
        <input type="hidden" id="task-id">

        <div class="form-group">
          <label for="task-title">Title</label>
          <input type="text" id="task-title" required autocomplete="off" placeholder="e.g. Math Test Ch. 5">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="task-type">Type</label>
            <select id="task-type" required>
              <option value="Homework">Homework</option>
              <option value="Test">Test</option>
              <option value="Event">Event</option>
            </select>
          </div>

          <div class="form-group">
            <label for="task-date">Due Date</label>
            <input type="datetime-local" id="task-date">
          </div>
        </div>

        <div class="form-group">
          <label for="task-location">Location</label>
          <input type="text" id="task-location" autocomplete="off" placeholder="e.g. Room 402">
        </div>

        <div class="form-group">
          <label for="task-desc">Notes</label>
          <textarea id="task-desc" rows="3" placeholder="Optional notes..."></textarea>
        </div>

        <div class="form-actions">
          <button type="button" id="delete-task-btn" class="btn-danger hidden">Delete</button>
          <button type="submit" class="btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Zone completion overlay -->
  <div class="zone-complete-overlay hidden" id="zone-complete-overlay">
    <div class="zone-complete-content">
      <div class="zone-complete-icon">✓</div>
      <h2>Session Complete</h2>
      <p id="zone-complete-msg">You stayed in the zone.</p>
      <button class="btn-primary zone-complete-dismiss" id="zone-complete-dismiss">Done</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
